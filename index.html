    <script type="text/javascript">
    $.fn.isInViewport = function() {
        var elementTop = $(this).offset().top;
        var elementBottom = elementTop + $(this).outerHeight();

        var viewportTop = $(window).scrollTop();
        var viewportBottom = viewportTop + $(window).height();

        return elementBottom > viewportTop && elementTop < viewportBottom;
    };
    
    var projectScrolled = false;
    var blogScrolled = false;
    $(window).on('resize scroll', function() {
        if ($('#Projects').isInViewport() && !projectScrolled) {
            $('#project-title').addClass('fadeInTop');
            $('#Projects').addClass('fadeInTop');
            var projectScrolled = true;
        }
        if ($('#blog-title').isInViewport() && !blogScrolled) {
            $('#blog-title').addClass('fadeInTop');
            blogScrolled = true;
        } 
        if ($('.home-blog').isInViewport()) {
            $('.home-blog').show();
            $('.home-blog').addClass('scale-in-center');
        } 
        
    });
    $(document).ready(function () {
  
        'use strict';
        
         var c, currentScrollTop = 0,
             header = $('header');
      
         $(window).scroll(function () {
            var a = $(window).scrollTop();
            var b = header.height();
           
            currentScrollTop = a;
           
            if (c < currentScrollTop && a > b + b) {
              header.addClass("scrollUp");
            } else if (c > currentScrollTop && !(a <= b)) {
              header.removeClass("scrollUp");
            }
            c = currentScrollTop;
           
           console.log(a);
        });
        
      });
    
</script>
