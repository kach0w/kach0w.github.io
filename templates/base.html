<!DOCTYPE html>
<html lang="en">
<head>
    {% set title = section.title | default(value=page.title | default(value="Karthik")) %}
    {% set description = section.description | default(value=page.description | default(value="")) %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="icon" type="image/png" href="/profile.png">
    <link href="/static/index.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ get_url(path='blog.css')}}">
    <link rel="stylesheet" href="{{ get_url(path='books.css')}}">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">
    <style>
        body {
            width: 25rem;
            max-width: 90%;
            padding: 0;
            margin: auto;
            color: #2D2926;
            background-color:#4F5D44;  ;
            /* font-family: 'Libre Baskerville', serif; */
            /* font-family: ui-serif,Georgia,Cambria,Times New Roman,Times,serif; */
            font-family: "Source Serif 4", serif;
            /* font-family: "Ubuntu", serif; */
            /* font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; */
            /* font-family: "Libre Baskerville", serif; */
            /* font-family: Georgia, 'Times New Roman', Times, serif */
        }
        header {
            max-width: 90%;
            display:flex;
            margin-left: auto;
            margin-right: auto;
            margin-top:3rem;
            justify-content: space-between;
            padding-right: 10px;
            color:#D97757
        }
        footer {
            max-width: 90%;
            padding-left: 18.5px;
            padding-top:13px;
        }
        main {
            margin-top: 1rem;
        }
        .logo {
            width: 60px;
            height: 60px;
            border-radius: 8px;
        }
        a {
            color:#D97757;
            text-decoration: none;
        }
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        h1 {
            font-size: 2.3rem;
            color:#333;
            font-weight: 700;
        }
        @media (max-width: 767px) {
            header {
                margin-top:1.5rem;
                margin-bottom:1rem;
            }
        }

    </style>
    <script src="{{ get_url(path='/blog.js')}}"></script>
</head>
<body>  
    <header>
        <div style="justify-content: space-between; width:100%; display:flex;">
            <div style="display: flex;">
                <a href="/"><img class="logo" src="/profile.png" alt="Profile"></a>
                <div>
                    <a href="/"><h1 style="color:white; padding-inline:7.5px; padding-top:6px;">Karthik</h1></a>
                </div> 
            </div>   
            <div style="display: flex; padding-top: 15px">
                <a href="/blog">blog</a> &nbsp;/&nbsp; <a href="/books">books</a>
            </div>
        </div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <a href="mailto:karsab343@gmail.com" style="text-decoration: none;">email</a> · <a href="https://github.com/kach0w" style="text-decoration: none;">github</a>
    </footer>
</body>
</html>
