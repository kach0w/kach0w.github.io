{% extends "base.html" %}

{% block content %}
<div style="margin-top:5px; background-color: white; padding: 15px; border-radius: 8px; border: 3px solid black;">
<div style="text-align: center; margin-top:10px;">
  <div>
   <h2 style="font-size:1.2rem">{{ page.title }}</h1>
  </div>
  <p style="font-size:0.9rem">{{ page.month}}/{{page.day}}/{{page.year}} • {{page.reading_time}} minute(s)</p>
</div>
{{ page.content | safe }}
</div>

{% endblock content %}
