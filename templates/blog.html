{% extends "base.html" %}
{% block content %}

<div style="margin-top:5px; background-color: white; padding: 15px; border-radius: 8px; border: 3px solid black;">
<div>
  {{ section.content | safe }}
</div>
<ul>
  {% for page in section.pages%}
    {% if not page.extra["private"] %}
      <li><a style="text-decoration-line: none; text-transform: lowercase;" href="{{ page.permalink | safe }}">{{ page.title }}</a> <span style="font-size:0.9rem">({{page.month}}/{{page.day}}/{{page.year}})</s></li>
    {% endif %}
  {% endfor %}
</ul>
<br>
</div>
{% endblock %}
