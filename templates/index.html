{% extends "base.html" %}

{% block content %}
<style>
  .custom-bullets {
  list-style: none; /* Hide the default ugly dot */
  padding-left: 0;   /* Remove default indentation */
  margin: 0;
}

.custom-bullets li {
  position: relative;
  padding-left: 1.5rem; /* Make room for the new bullet */
  margin-bottom: 0.75rem; /* Space out your lines nicely */
  line-height: 1.2;
}

/* Create the custom rounded-square bullet */
.custom-bullets li::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0.35em; /* Nudges it down to align perfectly with the text height */
  
  /* Size of the bullet */
  width: 8px;
  height: 8px;
  
  /* Match your theme's green accent or bear background color */
  background-color: #2D2926; 
  
  /* This creates the "squircle" / rounded square effect */
  border-radius: 1.5px; 
}
</style>
<div >
  {{ section.content | safe }}
</div>


{% endblock %}
